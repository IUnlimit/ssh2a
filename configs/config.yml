# 日志项配置
log:
  # 是否每次启动新建log文件
  force-new: false
  # 日志等级
  #   trace debug info warn error
  level: "debug"
  # 日志存活时间，到期新建log文件
  aging: 24h
  # 是否开启控制台颜色
  colorful: true

bind:
  host: 0.0.0.0
  http-port: 9080
  ssh-port: 9022

# http 验证密码
authorization:
  # 验证类型
  # - basic 进入网页输入密码 / 携带请求头验证
  # - authenticator 2FA 验证
  type: 'authenticator'
  basic:
    # 验证密匙
    # 在网页直接输入 / 使用 Authorization 请求头访问 /api/v1/auth 进行验证
    secret: '123456'
  authenticator:
    # 个人密匙
    # 用于生成可订阅的 2FA 密匙
    # 在网页直接输入 / 使用 Authorization 请求头访问 /api/v1/auth 进行验证
    private-secret: ''

# 数据库配置
database:
  host: 127.0.0.1
  port: 5432
  user: postgres
  password: '123456'
  dbname: ssh2a

# 蜜罐配置
honeypot:
  # 被拒绝后多久未验证、再次请求SSH则进入蜜罐
  trigger-timeout: 3m

# 认证策略
auth:
  # 验证通过后SSH放行持续时间
  valid-duration: 30m

# 管理台配置
admin:
  # 允许访问管理台的IP列表，为空则不限制
  allowed-hosts:
    - 127.0.0.1
    - ::1
